name: Dependency Update

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Update dependencies
      run: |
        npm update
        npm audit fix || true

    - name: Create test .env file
      run: |
        cat > .env << EOF
        API_KEY=test_key
        API_ENDPOINT=https://test.api.com
        TELEGRAM_TOKEN=test_token
        BOT_USERNAME=test_bot
        TARGET_GROUP_IDS=-100123456789
        NOTIFICATION_GROUP_ID=-100123456789
        SPAM_THRESHOLD=0.7
        ADDITIONAL_API_KEY=test_additional_key
        SECONDARY_SPAM_API_KEY=test_secondary_key
        ALLOWED_USERS=testuser
        BLOCKED_USERS=
        DATA_KEYWORDS=
        ALITAYIN_USER_ID=123456
        KOUSH_USER_ID=789012
        ECASH_ARMY_GROUP_ID=-100123456789
        EOF

    - name: Run tests
      run: npm test

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update dependencies'
        title: 'chore: weekly dependency update'
        body: |
          Automated dependency update

          - Updated npm packages
          - Ran security audit
          - All tests passing
        branch: dependency-updates
        delete-branch: true
