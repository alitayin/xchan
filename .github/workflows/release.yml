name: Auto Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm ci

    - name: Create test .env file
      run: |
        cat > .env << EOF
        API_KEY=test_key
        API_ENDPOINT=https://test.api.com
        TELEGRAM_TOKEN=test_token
        BOT_USERNAME=test_bot
        TARGET_GROUP_IDS=-100123456789
        NOTIFICATION_GROUP_ID=-100123456789
        SPAM_THRESHOLD=0.7
        ADDITIONAL_API_KEY=test_additional_key
        SECONDARY_SPAM_API_KEY=test_secondary_key
        ALLOWED_USERS=testuser
        BLOCKED_USERS=
        DATA_KEYWORDS=
        ALITAYIN_USER_ID=123456
        KOUSH_USER_ID=789012
        ECASH_ARMY_GROUP_ID=-100123456789
        EOF

    - name: Run tests
      run: npm test

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Generate changelog
      id: changelog
      run: |
        {
          echo "CHANGELOG<<EOF"
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s"
          echo ""
          echo "EOF"
        } >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Changes in this Release
          ${{ steps.changelog.outputs.CHANGELOG }}

          ## Installation
          ```bash
          git clone https://github.com/${{ github.repository }}.git
          cd echanTGbot
          git checkout ${{ github.ref_name }}
          npm install
          npm start
          ```
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
