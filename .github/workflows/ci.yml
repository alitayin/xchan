name: CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Create test .env file
      run: |
        cat > .env << EOF
        API_KEY=test_key
        API_ENDPOINT=https://test.api.com
        TELEGRAM_TOKEN=test_token
        BOT_USERNAME=test_bot
        TARGET_GROUP_IDS=-100123456789
        NOTIFICATION_GROUP_ID=-100123456789
        SPAM_THRESHOLD=0.7
        ADDITIONAL_API_KEY=test_additional_key
        SECONDARY_SPAM_API_KEY=test_secondary_key
        ALLOWED_USERS=testuser
        BLOCKED_USERS=
        DATA_KEYWORDS=
        ALITAYIN_USER_ID=123456
        KOUSH_USER_ID=789012
        ECASH_ARMY_GROUP_ID=-100123456789
        EOF

    - name: Run tests
      run: npm test

    - name: Upload coverage reports
      if: matrix.node-version == '20.x'
      uses: codecov/codecov-action@v4
      with:
        fail_ci_if_error: false
